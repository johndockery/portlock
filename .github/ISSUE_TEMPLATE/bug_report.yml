name: Bug report
description: Report incorrect behavior or a regression
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, config, and environment details when possible.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Portlock version
      placeholder: 0.1.1
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Relevant config
      description: Paste a reduced `.portlock.json` if relevant.
